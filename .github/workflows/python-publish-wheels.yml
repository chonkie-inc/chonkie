name: Build and Upload Python Wheels

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel and sdist
        run: uv build

      - uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  build-pyemscripten:
    name: Build PyEmscripten wheel (Pyodide ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.14'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pyodide-build
        run: pip install pyodide-build

      - name: Build PyEmscripten wheel
        run: pyodide build

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-pyemscripten-${{ matrix.python-version }}
          path: dist

  upload_pypi:
    needs: [build, build-pyemscripten]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: "{python-package-distributions,wheels-pyemscripten-*}"
          merge-multiple: true
          path: dist

      - uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
