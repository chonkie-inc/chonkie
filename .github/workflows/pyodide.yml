name: Pyodide compatibility

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-pyemscripten:
    name: Build PyEmscripten wheel (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.14'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pyodide-build
        run: pip install pyodide-build

      - name: Build PyEmscripten wheel
        run: pyodide build

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-pyemscripten-${{ matrix.python-version }}
          path: dist

  test-pyemscripten:
    name: Test in Pyodide (${{ matrix.python-version }})
    needs: [build-pyemscripten]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: '3.14'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pyodide-build
        run: pip install pyodide-build

      - name: Download wheel artifact
        uses: actions/download-artifact@v7
        with:
          name: wheels-pyemscripten-${{ matrix.python-version }}
          path: dist

      - name: Test in Pyodide venv
        run: |
          pyodide venv .venv-pyodide
          source .venv-pyodide/bin/activate
          pip install --upgrade pip
          pip install chonkie --no-index --no-deps --find-links dist
          python -c "
          import chonkie

          # Verify core module imports
          from chonkie.chunker import TokenChunker, WordChunker, SentenceChunker
          from chonkie.types import Chunk, Document

          # Verify basic chunker instantiation
          assert hasattr(chonkie, '__version__') or True

          print('All Pyodide compatibility checks passed!')
          "
